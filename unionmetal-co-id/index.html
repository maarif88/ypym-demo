<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PT. Union Metal - Quality Steel Building Materials Since 1972</title>
  <meta name="description" content="PT. Union Metal is Indonesia's leading ISO-certified steel building material manufacturer. Trusted since 1972. Roofing, cladding, steel structure and more.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
          colors: {
            brand: {
              blue:  '#1A4BFF',
              dark:  '#0B0F41',
              white: '#F9FFFF',
              lime:  '#DAFF01',
              cyan:  '#30FFFC',
            },
          },
          transitionTimingFunction: {
            'spring': 'cubic-bezier(0.34, 1.56, 0.64, 1)',
            'ios':    'cubic-bezier(0.4, 0, 0.2, 1)',
          },
        },
      },
    };
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    /* ── Glassmorphism ──────────────────────────────────────── */
    .glass {
      background: rgba(255, 255, 255, 0.11);
      backdrop-filter: blur(28px) saturate(1.5);
      -webkit-backdrop-filter: blur(28px) saturate(1.5);
      border: 1px solid rgba(255, 255, 255, 0.18);
    }
    .glass-nav {
      background: #ffffff;
      border-bottom: 1px solid #e0e0e0;
    }

    /* ── Hero slide backgrounds ─────────────────────────────── */
    .slide-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center top;
      will-change: opacity, transform;
      transition: opacity 1.1s cubic-bezier(0.4, 0, 0.2, 1),
                  transform 1.1s cubic-bezier(0.4, 0, 0.2, 1);
      opacity: 0;
      transform: scale(1.05);
    }
    .slide-bg.is-active {
      opacity: 1;
      transform: scale(1);
    }

    /* ── Card content fade ──────────────────────────────────── */
    .card-body {
      transition: opacity 0.38s cubic-bezier(0.4, 0, 0.2, 1),
                  transform 0.38s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .card-body.is-out {
      opacity: 0;
      transform: translateY(9px);
    }

    /* ── Hero headline fade ─────────────────────────────────── */
    .hero-hl {
      transition: opacity 0.45s cubic-bezier(0.4, 0, 0.2, 1),
                  transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .hero-hl.is-out {
      opacity: 0;
      transform: translateY(14px);
    }

    /* ── Thumbnail progress bar ─────────────────────────────── */
    @keyframes fillBar {
      from { width: 0; }
      to   { width: 100%; }
    }
    .tprog {
      height: 100%;
      width: 0;
      background: white;
      border-radius: 9999px;
    }
    .tprog.is-running {
      animation: fillBar var(--dur, 5000ms) linear forwards;
    }

    /* ── Mobile menu slide ──────────────────────────────────── */
    .mobile-menu {
      transform: translateY(-100%);
      transition: transform 0.42s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .mobile-menu.is-open {
      transform: translateY(0);
    }

    /* ── Hamburger lines ────────────────────────────────────── */
    .hb {
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                  opacity 0.25s ease,
                  width 0.25s ease;
    }

    /* ── Scroll-hiding for thumb row ────────────────────────── */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* ── Touch feedback ─────────────────────────────────────── */
    @media (hover: none) {
      .thumb-btn:active { transform: scale(0.94); }
    }
  </style>
</head>

<body class="font-sans bg-black overflow-x-hidden antialiased">

  <!-- ============================================================
       NAVIGATION
  ============================================================ -->
  <header class="fixed top-0 left-0 right-0 z-50 glass-nav">
    <div class="max-w-screen-xl mx-auto px-4 sm:px-6 xl:px-10">
      <div class="flex items-center justify-between h-[60px] sm:h-[64px]">

        <!-- Logo -->
        <a href="/" aria-label="PT Union Metal Home"
           class="flex items-center gap-3 group select-none">
          <!-- Union Metal diamond mark -->
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none" aria-hidden="true"
               class="shrink-0 group-hover:scale-105 transition-transform duration-300 ease-spring">
            <!-- Left chevron < -->
            <path d="M20 3 L4 20 L20 37 L24 37 L9 20 L24 3 Z" fill="#E8650A"/>
            <!-- Right chevron > -->
            <path d="M20 3 L36 20 L20 37 L16 37 L31 20 L16 3 Z" fill="#E8650A"/>
            <!-- U-channel (white cutout) -->
            <path d="M13 16 L13 26.5 L16.5 26.5 L16.5 19.5 L23.5 19.5 L23.5 26.5 L27 26.5 L27 16"
                  stroke="white" stroke-width="2.8" fill="none"
                  stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <div class="flex flex-col leading-none">
            <span class="text-[#161616] font-bold text-[15px] tracking-[-0.01em]">Union Metal</span>
            <span class="text-[#525252] text-[10.5px] font-medium mt-[2px]">PT. Union Metal</span>
          </div>
        </a>

        <!-- Desktop nav links -->
        <nav class="hidden md:flex items-center gap-6" aria-label="Primary">
          <a href="#" class="text-[#525252] hover:text-[#E8650A] text-[13.5px] font-medium transition-colors duration-200">Products</a>
          <a href="#" class="text-[#525252] hover:text-[#E8650A] text-[13.5px] font-medium transition-colors duration-200">Solutions</a>
          <a href="#" class="text-[#525252] hover:text-[#E8650A] text-[13.5px] font-medium transition-colors duration-200">Projects</a>
          <a href="#" class="text-[#525252] hover:text-[#E8650A] text-[13.5px] font-medium transition-colors duration-200">About</a>
          <a href="#" class="text-[#525252] hover:text-[#E8650A] text-[13.5px] font-medium transition-colors duration-200">Contact</a>
        </nav>

        <!-- Right CTA + hamburger -->
        <div class="flex items-center gap-3">
          <a href="#"
             class="hidden md:inline-flex items-center px-[18px] h-9 rounded-full
                    bg-[#E8650A] text-white text-[13px] font-semibold
                    hover:bg-[#d05a08]
                    transition-all duration-200 active:scale-95">
            Contact Us
          </a>

          <!-- Hamburger -->
          <button id="menu-btn"
                  aria-label="Toggle menu" aria-expanded="false"
                  class="md:hidden w-9 h-9 rounded-xl flex flex-col items-center justify-center gap-[5.5px]
                         hover:bg-black/5 focus:outline-none focus-visible:ring-2 focus-visible:ring-black/20
                         transition-colors duration-200">
            <span class="hb block w-[18px] h-[1.5px] bg-[#161616] rounded-full" id="hb1"></span>
            <span class="hb block w-[18px] h-[1.5px] bg-[#161616] rounded-full" id="hb2"></span>
            <span class="hb block w-[13px] h-[1.5px] bg-[#161616] rounded-full self-start ml-[2.5px]" id="hb3"></span>
          </button>
        </div>

      </div>
    </div>
  </header>

  <!-- ============================================================
       MOBILE MENU
  ============================================================ -->
  <div id="mobile-menu"
       aria-hidden="true"
       class="mobile-menu fixed top-[60px] sm:top-[64px] left-0 right-0 z-40
              bg-white border-b border-[#e0e0e0]">
    <div class="px-4 sm:px-6 py-5 flex flex-col gap-1">
      <a href="#" class="block px-4 py-3 text-[#525252] hover:text-[#E8650A] hover:bg-orange-50 rounded-xl text-[16px] font-medium transition-all duration-200">Products</a>
      <a href="#" class="block px-4 py-3 text-[#525252] hover:text-[#E8650A] hover:bg-orange-50 rounded-xl text-[16px] font-medium transition-all duration-200">Solutions</a>
      <a href="#" class="block px-4 py-3 text-[#525252] hover:text-[#E8650A] hover:bg-orange-50 rounded-xl text-[16px] font-medium transition-all duration-200">Projects</a>
      <a href="#" class="block px-4 py-3 text-[#525252] hover:text-[#E8650A] hover:bg-orange-50 rounded-xl text-[16px] font-medium transition-all duration-200">About</a>
      <a href="#" class="block px-4 py-3 text-[#525252] hover:text-[#E8650A] hover:bg-orange-50 rounded-xl text-[16px] font-medium transition-all duration-200">Contact</a>
      <div class="pt-4 mt-2 border-t border-[#e0e0e0]">
        <a href="#"
           class="block w-full text-center py-3 rounded-xl bg-[#E8650A] text-white font-semibold text-[15px]
                  hover:bg-[#d05a08] transition-colors duration-200 active:scale-[0.98]">
          Contact Us
        </a>
      </div>
    </div>
  </div>

  <!-- ============================================================
       HERO SECTION
  ============================================================ -->
  <section id="hero"
           class="relative w-full overflow-hidden"
           style="height: 100svh; min-height: 620px;">

    <!-- Slide backgrounds -->
    <div class="absolute inset-0 z-0" id="slides-wrap" aria-hidden="true"></div>

    <!-- Cinematic gradient overlays -->
    <div class="absolute inset-0 z-10 pointer-events-none" aria-hidden="true">
      <div class="absolute inset-0 bg-gradient-to-r from-black/65 via-black/20 to-transparent"></div>
      <div class="absolute inset-0 bg-gradient-to-t from-black/85 via-black/15 to-transparent"></div>
      <div class="absolute top-0 left-0 right-0 h-24 bg-gradient-to-b from-black/20 to-transparent"></div>
    </div>

    <!-- Hero content -->
    <div class="relative z-20 h-full flex flex-col pt-[60px] sm:pt-[64px]">

      <!-- Flex spacer + main content row -->
      <div class="flex-1 flex items-end px-4 sm:px-6 lg:px-12 xl:px-16">
        <div class="w-full flex flex-col lg:flex-row items-end justify-between
                    gap-5 lg:gap-10 pb-5 lg:pb-10">

          <!-- Glass card (left) -->
          <div class="glass rounded-[20px] p-5 sm:p-6
                      w-full sm:max-w-[300px] lg:max-w-[280px] xl:max-w-[305px] shrink-0
                      transition-transform duration-500 hover:-translate-y-1">

            <!-- Card icon badge -->
            <div class="w-[34px] h-[34px] rounded-full glass flex items-center justify-center mb-[18px]">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
                <circle cx="7" cy="7" r="2.8" fill="white" fill-opacity="0.9"/>
                <circle cx="7" cy="7" r="6.1" stroke="white" stroke-opacity="0.4" stroke-width="1"/>
              </svg>
            </div>

            <!-- Animated card body -->
            <div id="card-body" class="card-body">
              <h2 id="card-title"
                  class="text-white font-bold leading-[1.28] tracking-[-0.015em] mb-3
                         text-[17px] sm:text-[19px]"></h2>
              <p id="card-desc"
                 class="text-white/52 leading-[1.65] mb-5
                        text-[12.5px] sm:text-[13px]"></p>
              <button id="card-cta"
                      class="inline-flex items-center gap-2 px-4 h-9 rounded-full glass
                             text-white text-[12.5px] font-medium
                             hover:bg-white/20 transition-all duration-200 active:scale-95">
                <span id="card-cta-text">Explore More</span>
                <svg width="13" height="13" viewBox="0 0 13 13" fill="none" aria-hidden="true">
                  <path d="M2 6.5h9M8 3.5 11 6.5 8 9.5" stroke="white" stroke-width="1.4"
                        stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Large headline (desktop right) -->
          <div class="hidden lg:block text-right max-w-[460px] xl:max-w-[540px] 2xl:max-w-[600px]">
            <h1 id="hero-hl"
                class="hero-hl text-white font-black leading-[1.0] tracking-[-0.03em]
                       text-[50px] xl:text-[62px] 2xl:text-[70px]">
            </h1>
          </div>

        </div>
      </div>

      <!-- Mobile headline (above bottom strip) -->
      <div class="lg:hidden px-4 sm:px-6 pb-3">
        <h1 id="hero-hl-mob"
            class="hero-hl text-white font-black leading-[1.1] tracking-[-0.025em]
                   text-[28px] sm:text-[34px]">
        </h1>
      </div>

      <!-- Bottom strip -->
      <div class="border-t border-white/12 px-4 sm:px-6 lg:px-12 xl:px-16 py-3 sm:py-4">
        <div class="flex items-center gap-3 sm:gap-5">

          <!-- Slide label (hidden on xs) -->
          <div class="hidden sm:flex items-center gap-2 shrink-0 min-w-0 max-w-[170px] lg:max-w-[210px]">
            <span id="slide-label" class="text-white/45 text-[12px] sm:text-[12.5px] truncate"></span>
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none"
                 class="shrink-0 opacity-30" aria-hidden="true">
              <path d="M2 6.5h9M8 3.5 11 6.5 8 9.5" stroke="white" stroke-width="1.4"
                    stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>

          <!-- Thumbnail row -->
          <div id="thumbnails"
               class="flex gap-2 sm:gap-2.5 overflow-x-auto no-scrollbar flex-1">
          </div>

        </div>
      </div>

    </div>
  </section>

  <!-- ============================================================
       SCRIPT
  ============================================================ -->
  <script>
    'use strict';

    /* ── Slide data ──────────────────────────────────────────── */
    const SLIDES = [
      {
        image:   'https://images.pexels.com/photos/1267338/pexels-photo-1267338.jpeg?auto=compress&cs=tinysrgb&w=1920&h=1080&dpr=1',
        thumb:   'https://images.pexels.com/photos/1267338/pexels-photo-1267338.jpeg?auto=compress&cs=tinysrgb&w=180&h=120&dpr=1',
        title:   'Precision Steel Products Built for the Modern Era',
        desc:    'Over 50 years of manufacturing excellence. ISO-certified processes, rigorous quality control, and structural integrity that lasts decades.',
        cta:     'Explore Products',
        heading: ['Strength Built', 'Into Every', 'Steel Profile'],
        label:   'ISO-Certified Manufacturing',
      },
      {
        image:   'https://images.pexels.com/photos/2760244/pexels-photo-2760244.jpeg?auto=compress&cs=tinysrgb&w=1920&h=1080&dpr=1',
        thumb:   'https://images.pexels.com/photos/2760244/pexels-photo-2760244.jpeg?auto=compress&cs=tinysrgb&w=180&h=120&dpr=1',
        title:   'Advanced Metal Roofing for Every Scale of Project',
        desc:    'From residential homes to large industrial complexes, our roofing systems deliver superior weatherproofing, thermal efficiency, and long-term durability.',
        cta:     'View Roofing Solutions',
        heading: ['Roofing That', 'Stands the Test', 'of Time'],
        label:   'Nationwide Distribution',
      },
      {
        image:   'https://images.pexels.com/photos/236705/pexels-photo-236705.jpeg?auto=compress&cs=tinysrgb&w=1920&h=1080&dpr=1',
        thumb:   'https://images.pexels.com/photos/236705/pexels-photo-236705.jpeg?auto=compress&cs=tinysrgb&w=180&h=120&dpr=1',
        title:   'Structural Steel for Indonesia\'s Largest Projects',
        desc:    'Trusted by leading contractors and developers across Indonesia. Our structural steel delivers load-bearing performance and dimensional precision your projects demand.',
        cta:     'See Our Projects',
        heading: ['Building the', 'Infrastructure', 'of Tomorrow'],
        label:   'Trusted Since 1972',
      },
      {
        image:   'https://images.pexels.com/photos/1108101/pexels-photo-1108101.jpeg?auto=compress&cs=tinysrgb&w=1920&h=1080&dpr=1',
        thumb:   'https://images.pexels.com/photos/1108101/pexels-photo-1108101.jpeg?auto=compress&cs=tinysrgb&w=180&h=120&dpr=1',
        title:   'State-of-the-Art Production Facility in Indonesia',
        desc:    'Our modern factory operates with precision-engineered roll-forming machines, continuous quality monitoring, and a team of 500+ skilled professionals.',
        cta:     'Learn About Us',
        heading: ['Made in', 'Indonesia, Built', 'for the World'],
        label:   '500+ Expert Team',
      },
    ];

    const DURATION = 5200; /* ms per slide */

    /* ── State ───────────────────────────────────────────────── */
    let current       = 0;
    let autoTimer     = null;
    let transitioning = false;

    /* ── DOM refs ────────────────────────────────────────────── */
    const slidesWrap   = document.getElementById('slides-wrap');
    const thumbsEl     = document.getElementById('thumbnails');
    const cardBody     = document.getElementById('card-body');
    const cardTitle    = document.getElementById('card-title');
    const cardDesc     = document.getElementById('card-desc');
    const cardCtaText  = document.getElementById('card-cta-text');
    const heroHl       = document.getElementById('hero-hl');
    const heroHlMob    = document.getElementById('hero-hl-mob');
    const slideLabel   = document.getElementById('slide-label');

    /* ── Build slide backgrounds ─────────────────────────────── */
    SLIDES.forEach((s, i) => {
      const el = document.createElement('div');
      el.className = 'slide-bg' + (i === 0 ? ' is-active' : '');
      el.id = `slide-${i}`;
      el.style.backgroundImage = `url('${s.image}')`;
      slidesWrap.appendChild(el);
    });

    /* ── Build thumbnails ────────────────────────────────────── */
    function buildThumbs() {
      thumbsEl.innerHTML = '';
      SLIDES.forEach((s, i) => {
        const isActive = i === current;
        const btn = document.createElement('button');
        btn.className = [
          'thumb-btn relative shrink-0 rounded-[10px] overflow-hidden cursor-pointer',
          'focus:outline-none focus-visible:ring-2 focus-visible:ring-white',
          'transition-all duration-300',
          isActive
            ? 'ring-2 ring-white ring-offset-0 opacity-100 scale-100'
            : 'opacity-45 hover:opacity-70 scale-100',
        ].join(' ');
        btn.style.cssText = 'width:70px;height:46px;';
        btn.setAttribute('aria-label', `Slide ${i + 1}`);
        btn.innerHTML = `
          <img src="${s.thumb}" alt="" loading="${i === 0 ? 'eager' : 'lazy'}"
               class="w-full h-full object-cover">
          <div class="absolute inset-0 transition-opacity duration-300 bg-black"
               id="tov-${i}" style="opacity:${isActive ? 0 : 0.35}"></div>
          <div class="absolute bottom-0 left-0 right-0 h-[3px] bg-white/20">
            <div class="tprog" id="tprog-${i}" style="--dur:${DURATION}ms"></div>
          </div>`;
        btn.addEventListener('click', () => goTo(i));
        thumbsEl.appendChild(btn);
      });
    }

    /* ── Set text content ────────────────────────────────────── */
    function setContent(idx) {
      const s = SLIDES[idx];
      cardTitle.textContent   = s.title;
      cardDesc.textContent    = s.desc;
      cardCtaText.textContent = s.cta;
      slideLabel.textContent  = s.label;
      const html = s.heading.map(l => `<span class="block">${l}</span>`).join('');
      heroHl.innerHTML    = html;
      heroHlMob.innerHTML = html;
    }

    /* ── Transition to a given slide ─────────────────────────── */
    function goTo(idx) {
      if (idx === current || transitioning) return;
      transitioning = true;
      clearTimeout(autoTimer);

      const prev = current;
      current = idx;

      /* Swap bg */
      document.getElementById(`slide-${prev}`).classList.remove('is-active');
      document.getElementById(`slide-${idx}`).classList.add('is-active');

      /* Fade out content */
      cardBody.classList.add('is-out');
      heroHl.classList.add('is-out');
      heroHlMob.classList.add('is-out');

      /* Update thumbnails */
      thumbsEl.querySelectorAll('.thumb-btn').forEach((btn, i) => {
        const on = i === idx;
        btn.classList.toggle('ring-2', on);
        btn.classList.toggle('ring-white', on);
        btn.classList.toggle('opacity-100', on);
        btn.classList.toggle('opacity-45', !on);
        const ov = document.getElementById(`tov-${i}`);
        if (ov) ov.style.opacity = on ? '0' : '0.35';
        /* Reset progress bars */
        const bar = document.getElementById(`tprog-${i}`);
        if (bar) { bar.classList.remove('is-running'); bar.style.width = '0'; void bar.offsetWidth; }
      });

      /* Fade in new content after brief delay */
      setTimeout(() => {
        setContent(idx);
        cardBody.classList.remove('is-out');
        heroHl.classList.remove('is-out');
        heroHlMob.classList.remove('is-out');
        transitioning = false;

        /* Start progress bar */
        const bar = document.getElementById(`tprog-${idx}`);
        if (bar) { void bar.offsetWidth; bar.classList.add('is-running'); }

        startAuto();
      }, 380);
    }

    function startAuto() {
      clearTimeout(autoTimer);
      autoTimer = setTimeout(() => goTo((current + 1) % SLIDES.length), DURATION);
    }

    /* ── Mobile menu ─────────────────────────────────────────── */
    const menuBtn    = document.getElementById('menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');
    const hb1 = document.getElementById('hb1');
    const hb2 = document.getElementById('hb2');
    const hb3 = document.getElementById('hb3');
    let menuOpen = false;

    function toggleMenu(force) {
      menuOpen = (force !== undefined) ? force : !menuOpen;
      menuBtn.setAttribute('aria-expanded', String(menuOpen));
      mobileMenu.setAttribute('aria-hidden', String(!menuOpen));
      mobileMenu.classList.toggle('is-open', menuOpen);
      if (menuOpen) {
        hb1.style.transform = 'translateY(7px) rotate(45deg)';
        hb2.style.opacity   = '0';
        hb3.style.transform = 'translateY(-7px) rotate(-45deg)';
        hb3.style.width     = '18px';
        hb3.style.marginLeft = '0';
      } else {
        hb1.style.transform = '';
        hb2.style.opacity   = '';
        hb3.style.transform = '';
        hb3.style.width     = '';
        hb3.style.marginLeft = '';
      }
    }

    menuBtn.addEventListener('click', () => toggleMenu());

    mobileMenu.querySelectorAll('a, button').forEach(el => {
      el.addEventListener('click', () => toggleMenu(false));
    });

    /* ── Touch swipe on hero ─────────────────────────────────── */
    let touchX = 0;
    const heroEl = document.getElementById('hero');
    heroEl.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; }, { passive: true });
    heroEl.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - touchX;
      if (Math.abs(dx) > 48) {
        goTo(dx < 0
          ? (current + 1) % SLIDES.length
          : (current - 1 + SLIDES.length) % SLIDES.length);
      }
    }, { passive: true });

    /* ── Keyboard navigation ─────────────────────────────────── */
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft')  goTo((current - 1 + SLIDES.length) % SLIDES.length);
      if (e.key === 'ArrowRight') goTo((current + 1) % SLIDES.length);
    });

    /* ── Init ────────────────────────────────────────────────── */
    buildThumbs();
    setContent(0);
    setTimeout(() => {
      const bar = document.getElementById('tprog-0');
      if (bar) { void bar.offsetWidth; bar.classList.add('is-running'); }
      startAuto();
      transitioning = false;
    }, 120);

  </script>
</body>
</html>
